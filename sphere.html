      setTimeout(function() {
        showWinOverlay();
      }, 1500);
    }

    // ── 胜利界面控制 ──────────────────────────────────────────
    const winOverlayEl = document.getElementById('win-overlay');

    function showWinOverlay() {
      gameState = 'gameover';
      winOverlayEl.classList.add('active');
      // 最后一关隐藏"下一关"按钮
      var nextBtn = document.getElementById('win-next-btn');
      nextBtn.style.display = (currentLevel + 1 < LEVELS.length) ? '' : 'none';
    }

    function hideWinOverlay() {
      winOverlayEl.classList.remove('active');
    }

    document.getElementById('win-restart-btn').addEventListener('click', function() { startLevel(currentLevel); });
    document.getElementById('win-next-btn').addEventListener('click', function() {
      if (currentLevel + 1 < LEVELS.length) {
        startLevel(currentLevel + 1);
      } else {
        showLevelSelect();
      }
    });
    document.getElementById('win-menu-btn').addEventListener('click', showLevelSelect);

    // ── 关卡系统 UI ──────────────────────────────────────────
    var levelSelectOverlayEl = document.getElementById('level-select-overlay');
    var levelNameDisplayEl   = document.getElementById('level-name-display');
    var levelNameTextEl      = levelNameDisplayEl.querySelector('.ln-name');
    var lsGridEl             = document.getElementById('ls-grid');

    function showLevelSelect() {
      gameState = 'gameover';
      hideWinOverlay();
      hideGameOver();
      clearBlackhole();
      hideLevelSelect();  // 先移除再添加，确保动画重置
      // 停止当前关卡音乐
      GameAudio.stop(0.5);
      buildLevelGrid();
      levelSelectOverlayEl.classList.add('active');
    }

    function hideLevelSelect() {
      levelSelectOverlayEl.classList.remove('active');
    }

    function buildLevelGrid() {
      lsGridEl.innerHTML = '';
      for (var i = 0; i < LEVELS.length; i++) {
        var lv = LEVELS[i];
        var card = document.createElement('div');
        card.className = 'ls-card' + (i >= unlockedLevels ? ' locked' : '');
        card.innerHTML =
          '<div class="ls-num">0' + (i + 1) + '</div>' +
          '<div class="ls-name">' + lv.name + '</div>' +
          '<div class="ls-desc">' + lv.desc + '</div>';
        if (i < unlockedLevels) {
          (function(levelIdx) {
            card.addEventListener('click', function() { startLevel(levelIdx); });
          })(i);
        }
        lsGridEl.appendChild(card);
      }
    }

    function showLevelName(levelIdx) {
      var lv = LEVELS[levelIdx];
      levelNameTextEl.textContent = lv.name;
      // 重置动画
      levelNameDisplayEl.classList.remove('show');
      void levelNameDisplayEl.offsetWidth;  // 强制 reflow
      levelNameDisplayEl.classList.add('show');
      setTimeout(function() {
        levelNameDisplayEl.classList.remove('show');
      }, 2600);
    }

    function startLevel(levelIdx) {
      currentLevel = levelIdx;
      hideLevelSelect();
      hideWinOverlay();
      hideGameOver();
      resetBoost();
      clearExplosion();
      clearBlockEffects();
      clearBlackhole();
      hideCombo();
      resetDistanceHUD();

      // 停止上一关音乐
      GameAudio.stop(0.5);

      // 异步加载并播放新关卡音乐（不阻塞游戏开始）
      var levelData = LEVELS[levelIdx];
      if (levelData.music) {
        // 显示一个小提示，2秒后自动消失
        showLoading();
        updateLoading(50);
        GameAudio.loadMusic(levelData.music).then(function(buf) {
          if (buf) {
            updateLoading(100);
            GameAudio.play(0, 1.5);
          }
          hideLoading();
        }).catch(function() {
          hideLoading();
        });
        // 保底：最多5秒后一定关闭加载界面，即使音乐没加载完
        setTimeout(function() { hideLoading(); }, 5000);
      }

      // 重置球体
      sphere.visible  = true;
      haloMesh.visible = true;
      ring1.visible   = true;
      ring2.visible   = true;
      ballX = 0;
      ballY = FLOOR_Y + BALL_R;
      ballZ = 0.0;

      // 重置球色
      var restartInitColorRand = blockRand(0 + 300);
      currentRequiredColorIdx = Math.floor(restartInitColorRand * 3);
      var restartInitColor = COLORS[currentRequiredColorIdx].clone();
      sphereMat.uniforms.uColor1.value.copy(restartInitColor);
      sphereMat.uniforms.uColor2.value.copy(restartInitColor);
      sphereMat.uniforms.uColor3.value.copy(restartInitColor);

      // 重置弹跳物理
      ballVY0 = MIN_VY;
      ballVZ  = 0;
      bounceStartZ = 0.0;
      currentBlockIdx = 0;
      var initTargetZ = getSegmentLandZ(0);
      var initG = Math.abs(GRAVITY);
      bounceDuration = 2 * ballVY0 / initG;
      ballVZ = (initTargetZ - ballZ) / bounceDuration;
      bounceT = clock.getElapsedTime();

      // 重置鼠标
      mouseXRaw   = 0;
      ballXTarget = 0;
      mouseInited = false;

      // 清除所有轨道段
      for (var i = segmentPool.length - 1; i >= 0; i--) {
        var seg = segmentPool[i];
        for (var mi = 0; mi < seg.meshes.length; mi++) {
          scene.remove(seg.meshes[mi].main, seg.meshes[mi].glow);
          seg.meshes[mi].main.geometry.dispose();
          seg.meshes[mi].glow.geometry.dispose();
          seg.meshes[mi].main.material.dispose();
          seg.meshes[mi].glow.material.dispose();
          if (seg.meshes[mi].arrow) {
            scene.remove(seg.meshes[mi].arrow);
            seg.meshes[mi].arrow.geometry.dispose();
          }
        }
        segActiveSet.delete(seg.gridIdx);
      }
      segmentPool.length = 0;

      // 重置 centerZ 缓存
      for (var key in segmentCenterMap) delete segmentCenterMap[key];

      gameState = 'playing';

      // 显示关卡名称
      showLevelName(levelIdx);
    }

    // ── Game Over 界面控制 ─────────────────────────────────────
    const overlayEl = document.getElementById('gameover-overlay');

    function showGameOver() {
      gameState = 'gameover';
      overlayEl.classList.add('active');
    }

    function hideGameOver() {
      overlayEl.classList.remove('active');
    }

    document.getElementById('restart-btn').addEventListener('click', function() { startLevel(currentLevel); });
    document.getElementById('go-menu-btn').addEventListener('click', showLevelSelect);

    // 碰撞检测：类型2/3轨道
    // 关键：必须使用 segmentPool 中存储的 blockInfos（与视觉渲染完全一致），
    // 而不是重新计算，否则当 currentRequiredColorIdx 在创建和碰撞之间变化时会导致不一致！
    function checkLandingCollision(landedIdx, landedType) {
      if (landedType === 1) return 0;  // 长直轨道不检测，返回0（无效值）

      // 从 segmentPool 中查找该段的 blockInfos（视觉一致的颜色信息）
      let segInfo = null;
      for (let si = 0; si < segmentPool.length; si++) {
        if (segmentPool[si].gridIdx === landedIdx) {
          segInfo = segmentPool[si].blockInfos;
          break;
        }
      }

      // 兜底：如果 segmentPool 中找不到（不应该发生），用 getSegmentBlockInfos
      if (!segInfo) {
        console.warn('[碰撞检测] idx=' + landedIdx + ' 未在 segmentPool 中找到，使用计算值');
        segInfo = getSegmentBlockInfos(landedIdx, currentRequiredColorIdx);
      }

      const ballColor = getBallColor();

      for (let i = 0; i < segInfo.length; i++) {
        const b = segInfo[i];
        const halfW = b.w / 2;
        // 球 X 是否落在方块 X 范围内
        if (ballX >= (b.x - halfW - BALL_R * 0.3) && ballX <= (b.x + halfW + BALL_R * 0.3)) {
          // 碰到方块了，比较颜色
          const isMatch = colorsMatch(ballColor, b.color);
          console.log('[碰撞检测] idx=' + landedIdx + ' block=' + i + 
            ' ballX=' + ballX.toFixed(3) + ' blockX=' + b.x.toFixed(3) + 
            ' blockRange=[' + (b.x - halfW).toFixed(3) + ',' + (b.x + halfW).toFixed(3) + ']' +
            ' ballColor=(' + ballColor.r.toFixed(3) + ',' + ballColor.g.toFixed(3) + ',' + ballColor.b.toFixed(3) + ')' +
            ' blockColor=(' + b.color.r.toFixed(3) + ',' + b.color.g.toFixed(3) + ',' + b.color.b.toFixed(3) + ')' +
            ' match=' + isMatch + ' colorIdx=' + b.colorIdx);
          if (isMatch) {
            // 颜色相同 → 安全，返回碰到的方块颜色索引
            return b.colorIdx;
          } else {
            // 颜色不同 → 死亡！
            triggerDeath();
            return -1;
          }
        }
      }
      // 没有碰到任何方块（悬空）→ 死亡
      console.log('[碰撞检测] idx=' + landedIdx + ' 悬空死亡! ballX=' + ballX.toFixed(3) + ' 未匹配任何方块');
      triggerDeath();
      return -1;
    }

    // 获取某段轨道的方块信息（X中心、宽度、颜色、颜色索引）
    // requiredColorIdx: 如果 >= 0，类型3必须包含此颜色（连通性保证）
    function getSegmentBlockInfos(idx, requiredColorIdx) {
      const type = getSegmentType(idx);
      const r1 = blockRand(idx + 200);
      const r2 = blockRand(idx + 300);
      const infos = [];

      if (type === 2) {
        // 三连块：粉黄蓝各一色，天然包含所有颜色，无需强制
        const groupStartX = -TYPE2_TOTAL_W / 2;
        const colorOrder = [0, 1, 2];
        for (let i = 0; i < 3; i++) {
          const bx = groupStartX + TYPE2_W / 2 + i * (TYPE2_W + TYPE2_GAP);
          infos.push({ x: bx, w: TYPE2_W, color: COLORS[colorOrder[i]], colorIdx: colorOrder[i] });
        }
      } else if (type === 3) {
        // 双连块：必须包含 requiredColorIdx 对应的颜色，确保路径连通
        const groupStartX = -TYPE3_TOTAL_W / 2;
        const reqIdx = (requiredColorIdx >= 0 && requiredColorIdx < 3) ? requiredColorIdx : Math.floor(r1 * 3);
        // 第一个块强制为必需颜色
        // 第二个块随机选一个不同于必需颜色的颜色
        const otherIdx = (reqIdx + 1 + Math.floor(r2 * 2)) % 3;
        const usedColorIndices = [reqIdx, otherIdx];

        for (let i = 0; i < 2; i++) {
          const bx = groupStartX + TYPE3_W / 2 + i * (TYPE3_W + TYPE3_GAP);
          infos.push({ x: bx, w: TYPE3_W, color: COLORS[usedColorIndices[i]], colorIdx: usedColorIndices[i] });
        }
      }
      return infos;
    }

    // 颜色比较（容差）
    function colorsMatch(c1, c2) {
      return Math.abs(c1.r - c2.r) < 0.05 &&
             Math.abs(c1.g - c2.g) < 0.05 &&
             Math.abs(c1.b - c2.b) < 0.05;
    }

    // 触发死亡
    function triggerDeath() {
      gameState = 'dying';
      dyingTimer = 0;
      hideCombo();
      triggerExplosion(ballX, ballY, ballZ, getBallColor());
      // 死亡音效：低沉下降音
      GameAudio.playSfx(200, 0.4, 'sawtooth');
      // 音乐淡出
      GameAudio.stop(1.5);
    }

    // ── 重新开始 ──────────────────────────────────────────────
    // restartGame 保留为兼容入口，实际调用 startLevel
    function restartGame() { startLevel(currentLevel); }

    // ── 弹跳物理（纯解析公式，完全帧率无关） ─────────────────
    // 核心思路：
    //   每次碰撞后，用解析公式精确计算整个弹跳周期：
    //     弹跳总时间 T = 2 * VY0 / g
    //     Z 方向速度 ballVZ = (下一轨道着地Z - 当前Z) / T
    //   之后整段弹跳中，Y 用抛体公式 y(t) = y0 + VY0*t - 0.5*g*t²，
    //   Z 用匀速公式 z(t) = z0 + VZ*t。
    //   不再使用欧拉积分，彻底消除帧率影响。
    const MIN_VY = 6.0;   // 碰地板时保证的最小反弹速度（决定弹跳高度）

    let ballY   = FLOOR_Y + BALL_R;  // 从着地状态开始
    let ballZ   = 0.0;
    let ballVY0 = MIN_VY;           // 本次弹跳初始Y速度
    let ballVZ  = 0;                // 本次弹跳Z速度（碰撞时一次算好）
    let bounceStartZ = 0.0;         // 本次弹跳起始Z
    let bounceT = 0;                // 本次弹跳开始时刻（绝对时间）
    let bounceDuration = 0;         // 本次弹跳总时长 T = 2 * ballVY0 / g
    let currentBlockIdx = 0;        // 当前要落向的轨道段 index（从0开始，先落地获得颜色）

    // ── 加速系统 ──
    const GRAVITY_BOOST       = 3.0;   // 加速倍率
    const BOOST_DURATION      = 10.0;  // 加速持续时间（秒）
    let gravityMultiplier     = 1.0;   // 当前重力倍率
    let boostTimer            = 0;     // 加速剩余时间
    let boostActiveAtBounce   = false; // 弹跳开始时加速是否激活（中途不变参数）

    function triggerBoost() {
      gravityMultiplier = GRAVITY_BOOST;
      boostTimer = BOOST_DURATION;
      boostActiveAtBounce = true;
    }

    function updateBoost(dt) {
      if (boostTimer > 0) {
        boostTimer -= dt;
        if (boostTimer <= 0) {
          boostTimer = 0;
          // 不立即改变 gravityMultiplier——等下次 startBounce 时才切换
          // 这样当前弹跳不会中途变形
        }
      }
    }

    // startBounce 时调用，根据当前状态决定本次弹跳使用的重力
    function getEffectiveGravity() {
      return boostTimer > 0 ? GRAVITY_BOOST : 1.0;
    }

    function resetBoost() {
      gravityMultiplier = 1.0;
      boostTimer = 0;
      boostActiveAtBounce = false;
      resetBoostParticles();
      resetTrail();
    }

    // ═══════════════════════════════════════════════════════════
    // ── 加速粒子漩涡背景系统 ──
    // ═══════════════════════════════════════════════════════════
    const BOOST_PARTICLE_COUNT = 8000;

    // ── Shader：多层叠加的炫酷粒子 ──
    const boostParticleVS = `
      attribute float aSize;
      attribute vec3  aParticleColor;
      attribute float aAlpha;
      uniform float uOpacity;
      varying vec3  vCol;
      varying float vAlpha;
      void main() {
        vCol   = aParticleColor;
        vAlpha = aAlpha * uOpacity;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = max(0.8, aSize * (200.0 / max(1.0, -mvPos.z)));
        gl_Position  = projectionMatrix * mvPos;
      }
    `;
    const boostParticleFS = `
      precision highp float;
      varying vec3  vCol;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float dist = length(uv);
        if (dist > 0.5) discard;

        // 三层光晕叠加
        float outer = exp(-dist * 3.5) * 0.6;
        float mid   = exp(-dist * 8.0) * 0.8;
        float core  = exp(-dist * 20.0);

        vec3 col = vCol * outer
                 + vCol * 1.3 * mid
                 + vec3(1.0, 0.95, 1.0) * core;

        float alpha = (outer + mid + core) * vAlpha;
        gl_FragColor = vec4(col, alpha);
      }
    `;

    // ── 粒子数据缓冲 ──
    const bpGeo = new THREE.BufferGeometry();
    const bpPositions  = new Float32Array(BOOST_PARTICLE_COUNT * 3);
    const bpSizes      = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpColors     = new Float32Array(BOOST_PARTICLE_COUNT * 3);
    const bpAlphas     = new Float32Array(BOOST_PARTICLE_COUNT);

    // 螺旋参数
    const bpAngles     = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpRadii      = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpAngSpeeds  = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpRadiiSpeed = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpZOffsets   = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpZDrifts    = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpYOffsets   = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpYDrifts    = new Float32Array(BOOST_PARTICLE_COUNT);
    const bpLayers     = new Uint8Array(BOOST_PARTICLE_COUNT);

    // ── 调色板（更丰富） ──
    const BOOST_COLORS = [
      [0.3, 0.55, 1.0],   // 亮蓝
      [1.0, 0.3, 0.85],  // 粉紫
      [0.15, 0.9, 1.0],  // 青
      [1.0, 0.75, 0.15], // 金黄
      [0.6, 0.25, 1.0],  // 深紫
      [1.0, 0.45, 0.2],  // 橙
      [0.25, 1.0, 0.6],  // 翠绿
      [0.1, 0.35, 0.95], // 深蓝
      [0.95, 0.2, 0.5],  // 品红
      [0.8, 0.8, 1.0],   // 淡蓝白
      [1.0, 1.0, 0.7],   // 暖白
    ];

    for (let i = 0; i < BOOST_PARTICLE_COUNT; i++) {
      // 分层：55% 内核 30% 中环 15% 外晕
      var lr = Math.random();
      var layer = lr < 0.55 ? 0 : (lr < 0.85 ? 1 : 2);
      bpLayers[i] = layer;

      var rMin, rMax, zRange, yRange, angSpdMin, angSpdMax, szMin, szMax, aBase;
      if (layer === 0) {
        rMin = 0.8; rMax = 5.0;
        zRange = 15; yRange = 5;
        angSpdMin = 2.0; angSpdMax = 6.0;
        szMin = 0.15; szMax = 0.8;
        aBase = 0.55;
      } else if (layer === 1) {
        rMin = 3.0; rMax = 14.0;
        zRange = 25; yRange = 12;
        angSpdMin = 1.0; angSpdMax = 3.5;
        szMin = 0.3; szMax = 1.6;
        aBase = 0.35;
      } else {
        rMin = 8.0; rMax = 30.0;
        zRange = 40; yRange = 20;
        angSpdMin = 0.3; angSpdMax = 1.5;
        szMin = 0.8; szMax = 3.5;
        aBase = 0.2;
      }

      bpAngles[i]     = Math.random() * Math.PI * 2;
      bpRadii[i]      = rMin + Math.random() * (rMax - rMin);
      bpAngSpeeds[i]  = (angSpdMin + Math.random() * (angSpdMax - angSpdMin)) * (Math.random() > 0.5 ? 1 : -1);
      bpRadiiSpeed[i] = -(0.3 + Math.random() * 1.2);
      bpZOffsets[i]   = (Math.random() - 0.5) * zRange * 2;
      bpZDrifts[i]    = -2 - Math.random() * 10;
      bpYOffsets[i]   = (Math.random() - 0.5) * yRange * 2;
      bpYDrifts[i]    = (Math.random() - 0.5) * 1.5;

      bpSizes[i]  = szMin + Math.random() * (szMax - szMin);
      bpAlphas[i] = aBase + Math.random() * 0.45;

      let c = BOOST_COLORS[Math.floor(Math.random() * BOOST_COLORS.length)];
      bpColors[i * 3]     = c[0];
      bpColors[i * 3 + 1] = c[1];
      bpColors[i * 3 + 2] = c[2];
    }

    bpGeo.setAttribute('position',        new THREE.BufferAttribute(bpPositions, 3));
    bpGeo.setAttribute('aSize',            new THREE.BufferAttribute(bpSizes, 1));
    bpGeo.setAttribute('aParticleColor',   new THREE.BufferAttribute(bpColors, 3));
    bpGeo.setAttribute('aAlpha',           new THREE.BufferAttribute(bpAlphas, 1));

    const bpMat = new THREE.ShaderMaterial({
      uniforms: { uOpacity: { value: 0 } },
      vertexShader:   boostParticleVS,
      fragmentShader: boostParticleFS,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    const boostParticlesMesh = new THREE.Points(bpGeo, bpMat);
    boostParticlesMesh.frustumCulled = false;
    scene.add(boostParticlesMesh);

    let boostParticleOpacity = 0;

    function updateBoostParticles(dt, t, ballPosZ) {
      var tgt = boostTimer > 0 ? 1.0 : 0.0;
      boostParticleOpacity += (tgt - boostParticleOpacity) * Math.min(1, dt * 3.5);
      bpMat.uniforms.uOpacity.value = boostParticleOpacity;
      if (boostParticleOpacity < 0.005) return;

      var posArr  = bpGeo.attributes.position.array;
      var alphaArr = bpGeo.attributes.aAlpha.array;
      var bx = ballX || 0, by = ballY || 0;

      for (let i = 0; i < BOOST_PARTICLE_COUNT; i++) {
        var i3 = i * 3;
        var layer = bpLayers[i];

        // 螺旋旋转
        bpAngles[i] += bpAngSpeeds[i] * dt;
        // 向心收缩
        bpRadii[i] += bpRadiiSpeed[i] * dt;

        // 层参数
        var rMin = layer === 0 ? 0.8 : (layer === 1 ? 3.0 : 8.0);
        var rMax = layer === 0 ? 5.0 : (layer === 1 ? 14.0 : 30.0);
        if (bpRadii[i] < rMin) {
          bpRadii[i] = rMax * (0.3 + Math.random() * 0.7);
        }

        // Z 漂移
        bpZOffsets[i] += bpZDrifts[i] * dt;
        var zRange = layer === 0 ? 15 : (layer === 1 ? 25 : 40);
        if (bpZOffsets[i] < -zRange) {
          bpZOffsets[i] = zRange * (0.3 + Math.random() * 0.7);
          bpRadii[i] = rMin + Math.random() * (rMax - rMin);
        } else if (bpZOffsets[i] > zRange) {
          bpZOffsets[i] = -zRange * (0.3 + Math.random() * 0.7);
        }

        // Y 漂移
        bpYOffsets[i] += bpYDrifts[i] * dt + Math.sin(t * 2.5 + bpAngles[i]) * 0.3 * dt;
        var yRange = layer === 0 ? 5 : (layer === 1 ? 12 : 20);
        if (bpYOffsets[i] > yRange) bpYOffsets[i] = -yRange;
        if (bpYOffsets[i] < -yRange) bpYOffsets[i] = yRange;

        // 极坐标 → 3D（以球为中心，Y 压扁形成吸积盘）
        var r  = bpRadii[i];
        var a  = bpAngles[i];
        var yFlatten = layer === 0 ? 0.25 : (layer === 1 ? 0.35 : 0.45);
        var px = bx + Math.cos(a) * r;
        var py = by + Math.sin(a) * r * yFlatten + bpYOffsets[i] * 0.25;
        var pz = ballPosZ + bpZOffsets[i];

        posArr[i3]     = px;
        posArr[i3 + 1] = py;
        posArr[i3 + 2] = pz;

        // 亮度
        var dz = pz - ballPosZ;
        var dx = px - bx;
        var dy = py - by;
        var dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        var pulse = 0.65 + 0.35 * Math.sin(t * 5.0 + bpAngles[i] * 3.0);
        var dFade = layer === 0
          ? (0.5 + 0.5 * Math.max(0, 1.0 - dist / 12.0))
          : (0.15 + 0.85 * Math.max(0, 1.0 - dist / 40.0));
        alphaArr[i] = bpAlphas[i] * dFade * pulse;
      }

      bpGeo.attributes.position.needsUpdate = true;
      bpGeo.attributes.aAlpha.needsUpdate   = true;
    }

    function resetBoostParticles() {
      boostParticleOpacity = 0;
      bpMat.uniforms.uOpacity.value = 0;
    }

    // ═══════════════════════════════════════════════════════════
    // ── 球体加速拖尾系统 ──
    // ═══════════════════════════════════════════════════════════
    const TRAIL_COUNT = 300;       // 拖尾粒子数量
    const TRAIL_LIFE  = 1.2;      // 每个粒子生命周期（秒）

    const trailVS = `
      attribute float aSize;
      attribute float aAlpha;
      uniform float uOpacity;
      varying float vAlpha;
      varying vec3  vPos;
      void main() {
        vAlpha = aAlpha * uOpacity;
        vPos   = position;
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * (120.0 / -mvPos.z);
        gl_Position  = projectionMatrix * mvPos;
      }
    `;
    const trailFS = `
      precision highp float;
      varying float vAlpha;
      varying vec3  vPos;
      uniform vec3  uTrailColor;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float dist = length(uv);
        if (dist > 0.5) discard;
        float glow = exp(-dist * 6.0);
        float core = exp(-dist * 16.0);
        vec3 col = uTrailColor * glow + vec3(1.0) * core * 0.5;
        gl_FragColor = vec4(col, glow * vAlpha);
      }
    `;

    const trailGeo = new THREE.BufferGeometry();
    const trailPositions = new Float32Array(TRAIL_COUNT * 3);
    const trailSizes     = new Float32Array(TRAIL_COUNT);
    const trailAlphas    = new Float32Array(TRAIL_COUNT);

    // 拖尾粒子数据
    const trailData = []; // { life, maxLife, vx, vy, vz }
    for (let i = 0; i < TRAIL_COUNT; i++) {
      trailPositions[i * 3] = 0;
      trailPositions[i * 3 + 1] = -999; // 隐藏在屏幕外
      trailPositions[i * 3 + 2] = 0;
      trailSizes[i]  = 0;
      trailAlphas[i] = 0;
      trailData.push({ life: 0, maxLife: 0.5, active: false });
    }
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    trailGeo.setAttribute('aSize',    new THREE.BufferAttribute(trailSizes, 1));
    trailGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(trailAlphas, 1));

    const trailMat = new THREE.ShaderMaterial({
      uniforms: {
        uTrailColor: { value: new THREE.Color(0x3a86ff) },
        uOpacity:    { value: 0 },
      },
      vertexShader:   trailVS,
      fragmentShader: trailFS,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    const trailMesh = new THREE.Points(trailGeo, trailMat);
    trailMesh.frustumCulled = false;
    scene.add(trailMesh);

    let trailEmitTimer = 0;
    let trailEmitIdx   = 0;
    let trailOpacity   = 0;

    function emitTrailParticle(bx, by, bz) {
      let idx = trailEmitIdx % TRAIL_COUNT;
      trailEmitIdx++;
      let i3 = idx * 3;
      trailPositions[i3]     = bx + (Math.random() - 0.5) * 0.6;
      trailPositions[i3 + 1] = by + (Math.random() - 0.5) * 0.6;
      trailPositions[i3 + 2] = bz + (Math.random() - 0.5) * 0.6;
      trailData[idx].life    = TRAIL_LIFE;
      trailData[idx].maxLife = TRAIL_LIFE * (0.5 + Math.random() * 0.5);
      trailData[idx].active  = true;
      // 向后扩散
      trailData[idx].vx = (Math.random() - 0.5) * 3.0;
      trailData[idx].vy = (Math.random() - 0.5) * 2.0 + 0.8;
      trailData[idx].vz = -4 - Math.random() * 6; // 向后高速飘
    }

    function updateTrail(dt, bx, by, bz) {
      // 渐入/渐出
      var targetOpacity = boostTimer > 0 ? 1.0 : 0.0;
      trailOpacity += (targetOpacity - trailOpacity) * Math.min(1, dt * 5);
      trailMat.uniforms.uOpacity.value = trailOpacity;

      // 更新拖尾颜色为球体当前颜色
      if (trailOpacity > 0.01) {
        trailMat.uniforms.uTrailColor.value.copy(getBallColor());
      }

      // 发射新粒子
      if (boostTimer > 0) {
        trailEmitTimer += dt;
        var emitInterval = 0.003; // 每 3ms 一个粒子，密集喷射
        while (trailEmitTimer >= emitInterval) {
          trailEmitTimer -= emitInterval;
          emitTrailParticle(bx, by, bz);
        }
      } else {
        trailEmitTimer = 0;
      }

      // 更新现有粒子
      var posArr   = trailGeo.attributes.position.array;
      var sizeArr  = trailGeo.attributes.aSize.array;
      var alphaArr = trailGeo.attributes.aAlpha.array;

      for (let i = 0; i < TRAIL_COUNT; i++) {
        let td = trailData[i];
        if (!td.active) {
          alphaArr[i] = 0;
          continue;
        }
        td.life -= dt;
        if (td.life <= 0) {
          td.active = false;
          alphaArr[i] = 0;
          posArr[i * 3 + 1] = -999;
          continue;
        }
        let t_ratio = td.life / td.maxLife; // 1 → 0
        let i3 = i * 3;
        posArr[i3]     += td.vx * dt;
        posArr[i3 + 1] += td.vy * dt;
        posArr[i3 + 2] += td.vz * dt;
        sizeArr[i]  = (0.5 + 2.0 * t_ratio) * (1.0 - (1.0 - t_ratio) * 0.5);
        alphaArr[i] = t_ratio * t_ratio; // 二次衰减，尾部渐隐
      }

      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.aSize.needsUpdate    = true;
      trailGeo.attributes.aAlpha.needsUpdate   = true;
    }

    function resetTrail() {
      trailOpacity = 0;
      trailEmitTimer = 0;
      trailMat.uniforms.uOpacity.value = 0;
      for (let i = 0; i < TRAIL_COUNT; i++) {
        trailData[i].active = false;
        trailAlphas[i] = 0;
        trailPositions[i * 3 + 1] = -999;
      }
      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.aAlpha.needsUpdate   = true;
      trailGeo.attributes.aSize.needsUpdate    = true;
    }

    // 初始化第一次弹跳：从 Z=0 弹起，先落到 idx=0 长直轨道获得标准颜色
    var initTargetZ = getSegmentLandZ(0);  // idx=0 中心 Z = 0
    var initG = Math.abs(GRAVITY);
    bounceDuration = 2 * ballVY0 / initG;
    ballVZ = (initTargetZ - ballZ) / bounceDuration;

    // 触发一次弹跳（碰撞时调用）
    function startBounce(fromZ, toZ, absTime) {
      bounceStartZ = fromZ;
      bounceT = absTime;
      ballVY0 = MIN_VY;
      var mult = getEffectiveGravity();
      gravityMultiplier = mult;  // 本次弹跳锁定重力倍率
      var g = Math.abs(GRAVITY) * mult;
      bounceDuration = 2 * ballVY0 / g;
      ballVZ = (toZ - fromZ) / bounceDuration;
    }

    // 根据弹跳内的经过时间，用解析公式算位置
    function getBouncePos(elapsed) {
      var g = Math.abs(GRAVITY) * gravityMultiplier;
      var y = (FLOOR_Y + BALL_R) + ballVY0 * elapsed - 0.5 * g * elapsed * elapsed;
      var z = bounceStartZ + ballVZ * elapsed;
      return { y: y, z: z };
    }

    // ── 鼠标控制参数 ───────────────────────────────────────────
    const MOUSE_SENSITIVITY = 0.035;   // 鼠标灵敏度（后期可调节）
    const MOUSE_SMOOTHING  = 0.15;     // 平滑因子（0~1，越小越平滑）
    const BALL_X_LIMIT     = 5.0;      // 球 X 方向移动范围限制
    let ballX        = 0;              // 球当前 X 坐标
    let ballXTarget  = 0;              // 球目标 X 坐标（鼠标映射值）
    let mouseXRaw    = 0;              // 鼠标原始归一化坐标（-1 ~ 1）
    let mouseInited  = false;          // 是否已初始化鼠标基准

    // 鼠标移动事件：水平位置映射为球的左右移动
    addEventListener('mousemove', (e) => {
      // 将鼠标屏幕 X 归一化到 [-1, 1]
      mouseXRaw = (e.clientX / innerWidth) * 2 - 1;
      // 首次移动时同步当前球位置，避免跳变
      if (!mouseInited) {
        ballXTarget = mouseXRaw * BALL_X_LIMIT;
        mouseInited = true;
      }
    });

    // 触屏支持
    addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        mouseXRaw = (e.touches[0].clientX / innerWidth) * 2 - 1;
        ballXTarget = mouseXRaw * BALL_X_LIMIT;
        mouseInited = true;
      }
    }, { passive: true });

    addEventListener('touchmove', (e) => {
      e.preventDefault(); // 阻止页面滚动
      if (e.touches.length > 0) {
        mouseXRaw = (e.touches[0].clientX / innerWidth) * 2 - 1;
        if (!mouseInited) {
          ballXTarget = mouseXRaw * BALL_X_LIMIT;
          mouseInited = true;
        }
      }
    }, { passive: false });

    // ── 交互（纯自动旋转，无鼠标操作） ───────────────────────
    let camDist = 10;

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── 动画循环 ─────────────────────────────────────────────
    const clock = new THREE.Clock();
    let   prevT = 0;

    function animate() {
      requestAnimationFrame(animate);
      var t  = clock.getElapsedTime();
      var dt = Math.min(t - prevT, 0.05);
      prevT = t;

      // ── 鼠标 → 球 X 平滑跟随 ──
      ballXTarget = -mouseXRaw * BALL_X_LIMIT * MOUSE_SENSITIVITY / 0.035;
      ballXTarget = Math.max(-BALL_X_LIMIT, Math.min(BALL_X_LIMIT, ballXTarget));
      ballX += (ballXTarget - ballX) * MOUSE_SMOOTHING;

      // ── 游戏状态分支 ──
      if (gameState === 'dying') {
        dyingTimer += dt;
        updateBoost(dt);
        updateExplosion(dt);
        updateBlockEffects(dt);
        updateBlackhole(dt, t);
        updateBoostParticles(dt, t, ballZ);
        updateTrail(dt, ballX, ballY, ballZ);
        // 渲染但冻结物理
        renderer.render(scene, camera);
        if (dyingTimer >= DYING_DURATION) {
          showGameOver();
        }
        return;
      }
      if (gameState === 'gameover') {
        // 冻结一切，只更新粒子残留和方块特效
        updateBoost(dt);
        updateExplosion(dt);
        updateBlockEffects(dt);
        updateBlackhole(dt, t);
        updateBoostParticles(dt, t, ballZ);
        updateTrail(dt, ballX, ballY, ballZ);
        renderer.render(scene, camera);
        return;
      }

      // winning 状态也更新黑洞
      if (gameState === 'winning') {
        updateBoost(dt);
        updateBlackhole(dt, t);
        updateBoostParticles(dt, t, ballZ);
        updateTrail(dt, ballX, ballY, ballZ);
        renderer.render(scene, camera);
        return;
      }

      // ── 以下是正常游戏逻辑（playing） ──

      // 更新方块特效
      updateBlockEffects(dt);

      // 更新黑洞
      updateBlackhole(dt, t);

      // 黑洞碰撞检测
      if (blackhole && checkBlackholeCollision()) {
        triggerWin();
        return;
      }

      // 弹跳物理（纯解析公式，帧率无关）
      var elapsed = t - bounceT;  // 从本次弹跳开始经过的时间

      // 更新加速计时
      updateBoost(dt);

      // 更新加速粒子背景
      updateBoostParticles(dt, t, ballZ);

      // 更新球体拖尾
      updateTrail(dt, ballX, ballY, ballZ);

      // 用解析公式算当前位置（使用当前弹跳锁定的重力倍率）
      var g = Math.abs(GRAVITY) * gravityMultiplier;
      var newY = (FLOOR_Y + BALL_R) + ballVY0 * elapsed - 0.5 * g * elapsed * elapsed;
      var newZ = bounceStartZ + ballVZ * elapsed;

      // 着地检测
      if (elapsed >= bounceDuration || newY <= FLOOR_Y + BALL_R) {
        // 精确钳位到轨道着地点
        ballY = FLOOR_Y + BALL_R;
        ballZ = bounceStartZ + ballVZ * bounceDuration;  // 精确解析落地Z

        // 根据当前落上的轨道段改变球体颜色
        var landedIdx = currentBlockIdx;
        var landedType = getSegmentType(landedIdx);

        // 调试日志：打印每次着地的详细信息
        var ballColorDebug = getBallColor();
        console.log('[着地] idx=' + landedIdx + ' type=' + landedType + 
          ' ballX=' + ballX.toFixed(3) + ' ballZ=' + ballZ.toFixed(3) +
          ' ballColor=(' + ballColorDebug.r.toFixed(3) + ',' + ballColorDebug.g.toFixed(3) + ',' + ballColorDebug.b.toFixed(3) + ')' +
          ' requiredIdx=' + currentRequiredColorIdx);

        if (landedType === 1) {
          // 长直轨道：球变成轨道的单一颜色，更新必需颜色索引
          // 从 segmentPool 读取颜色（与视觉一致）
          var cIdx = -1;
          for (var si = 0; si < segmentPool.length; si++) {
            if (segmentPool[si].gridIdx === landedIdx && segmentPool[si].blockInfos.length > 0) {
              cIdx = segmentPool[si].blockInfos[0].colorIdx;
              break;
            }
          }
          if (cIdx < 0) cIdx = Math.floor(blockRand(landedIdx + 300) * 3);  // 兜底
          var tc = COLORS[cIdx].clone();
          sphereMat.uniforms.uColor1.value.copy(tc);
          sphereMat.uniforms.uColor2.value.copy(tc);
          sphereMat.uniforms.uColor3.value.copy(tc);
          currentRequiredColorIdx = cIdx;

          // 触发连击鼓励
          triggerCombo(tc);

          // 长直轨道也触发下陷 + 涟漪特效
          for (var si3 = 0; si3 < segmentPool.length; si3++) {
            if (segmentPool[si3].gridIdx === landedIdx) {
              var seg3 = segmentPool[si3];
              if (seg3.meshes.length > 0) {
                var tMesh = seg3.meshes[0];
                triggerBlockEffect(tMesh.main, tMesh.glow, tMesh.main.position.x, tMesh.main.position.y, tMesh.main.position.z, tc);
              }
              break;
            }
          }
        } else if (landedType === 4) {
          // ── 加速轨道：不改变颜色，触发加速 ──
          triggerBoost();
          triggerCombo(getBallColor());  // 仍然计数连击
          // 加速音效
          GameAudio.playSfx(600, 0.15, 'square');
          setTimeout(function() { GameAudio.playSfx(900, 0.2, 'square'); }, 100);

          // 触发白色特效
          for (var si4 = 0; si4 < segmentPool.length; si4++) {
            if (segmentPool[si4].gridIdx === landedIdx) {
              var seg4 = segmentPool[si4];
              if (seg4.meshes.length > 0) {
                var tMesh4 = seg4.meshes[0];
                triggerBlockEffect(tMesh4.main, tMesh4.glow, tMesh4.main.position.x, tMesh4.main.position.y, tMesh4.main.position.z, new THREE.Color(0x88aaff));
              }
              break;
            }
          }
        } else {
          // 类型2/3：检查碰撞（球色 vs 方块色）
          var landedColorIdx = checkLandingCollision(landedIdx, landedType);
          if (gameState !== 'playing') {
            // 已经触发死亡，不再继续弹跳
            return;
          }
          // 安全落地：球变成碰到的方块颜色
          // 使用 checkLandingCollision 返回的 colorIdx（来自 segmentPool 中的 blockInfos）
          if (landedColorIdx >= 0) {
            var safeColor = COLORS[landedColorIdx].clone();
            sphereMat.uniforms.uColor1.value.copy(safeColor);
            sphereMat.uniforms.uColor2.value.copy(safeColor);
            sphereMat.uniforms.uColor3.value.copy(safeColor);
            currentRequiredColorIdx = landedColorIdx;

            // 触发连击鼓励
            triggerCombo(safeColor);

            // 触发方块下陷 + 涟漪特效：找到被碰到的方块 mesh
            for (var si2 = 0; si2 < segmentPool.length; si2++) {
              if (segmentPool[si2].gridIdx === landedIdx) {
                var seg2 = segmentPool[si2];
                // blockInfos 与 meshes 一一对应，找 landedColorIdx 对应的那个
                for (var bi = 0; bi < seg2.blockInfos.length; bi++) {
                  if (seg2.blockInfos[bi].colorIdx === landedColorIdx) {
                    var bMesh = seg2.meshes[bi];
                    if (bMesh) {
                      var bwx = bMesh.main.position.x;
                      var bwy = bMesh.main.position.y;
                      var bwz = bMesh.main.position.z;
                      triggerBlockEffect(bMesh.main, bMesh.glow, bwx, bwy, bwz, safeColor);
                    }
                    break;
                  }
                }
                break;
              }
            }
          }
        }

        // 计算下一块轨道的着地目标 Z
        var nextIdx = currentBlockIdx + 1;
        var nextLandZ = getSegmentLandZ(nextIdx);

        // 触发下一次弹跳
        startBounce(ballZ, nextLandZ, t);
        currentBlockIdx = nextIdx;
      } else {
        ballY = newY;
        ballZ = newZ;
      }

      // 实时Y速度（仅用于视觉挤压效果，不参与物理计算）
      var sinceBounce = t - bounceT;
      var realtimeVY = ballVY0 - g * sinceBounce;

      // 挤压拉伸（用实时Y速度，仅视觉效果）
      var heightAbove = ballY - (FLOOR_Y + BALL_R);
      var squashFactor  = 1.0 - Math.max(0, 0.35 * (1.0 - heightAbove / 4.0));
      var stretchFactor = 1.0 + Math.max(0, 0.2 * Math.abs(realtimeVY) / 8.0);
      var scaleY  = realtimeVY < 0 ? Math.max(0.55, squashFactor) : stretchFactor;
      var scaleXZ = 1.0 / Math.sqrt(Math.max(scaleY, 0.3));

      sphere.position.set(ballX, ballY, ballZ);
      sphere.scale.set(scaleXZ, scaleY, scaleXZ);
      haloMesh.position.set(ballX, ballY, ballZ);

      // 地面阴影
      var shadowDist = ballY - FLOOR_Y - BALL_R;
      shadowMesh.position.set(ballX, FLOOR_Y, ballZ);
      shadowMesh.material.opacity = Math.max(0, 0.55 * (1 - shadowDist / 4));
      shadowMesh.scale.setScalar(Math.max(0.2, 1 - shadowDist * 0.18));

      // 自动旋转
      sphere.rotation.y = t * 0.3;
      sphere.rotation.x = t * 0.1;

      sphereMat.uniforms.uTime.value = t;
      haloMat.uniforms.uTime.value   = t;

      // 光源绕轨
      pointLight.position.set(Math.sin(t * 0.7) * 3, 3, ballZ + Math.cos(t * 0.7) * 3);
      pointLight2.position.set(Math.cos(t * 0.5) * -3, Math.sin(t * 0.4) * 2, ballZ + 2);
      lSphere1.position.copy(pointLight.position);
      lSphere2.position.copy(pointLight2.position);

      // 装饰环
      ring1.rotation.z = t * 0.2;
      ring2.rotation.z = -t * 0.15;
      ring1.position.set(ballX, ballY, ballZ);
      ring2.position.set(ballX, ballY, ballZ);

      // 轨道段动态管理
      var avgStep = STEP;
      var idxStart = Math.max(0, Math.floor((ballZ - BLOCK_RANGE_BEHIND) / avgStep) - 3);
      var idxEnd   = Math.ceil((ballZ + BLOCK_RANGE_AHEAD) / avgStep) + 3;

      // 回收超出范围的段
      for (var i = segmentPool.length - 1; i >= 0; i--) {
        var seg = segmentPool[i];
        var scz = seg.centerZ;
        if (scz < ballZ - BLOCK_RANGE_BEHIND - 5 || scz > ballZ + BLOCK_RANGE_AHEAD + 5) {
          for (var mi = 0; mi < seg.meshes.length; mi++) {
            scene.remove(seg.meshes[mi].main, seg.meshes[mi].glow);
            seg.meshes[mi].main.geometry.dispose();
            seg.meshes[mi].glow.geometry.dispose();
            seg.meshes[mi].main.material.dispose();
            seg.meshes[mi].glow.material.dispose();
            if (seg.meshes[mi].arrow) {
              scene.remove(seg.meshes[mi].arrow);
              seg.meshes[mi].arrow.geometry.dispose();
            }
          }
          segmentFree.push(seg);
          segmentPool.splice(i, 1);
          segActiveSet.delete(seg.gridIdx);
        }
      }

      // 创建新进入范围的段
      for (var j = idxStart; j <= idxEnd; j++) {
        if (segActiveSet.has(j)) continue;
        var cz = getSegmentCenter(j);
        if (cz < ballZ - BLOCK_RANGE_BEHIND - 5 || cz > ballZ + BLOCK_RANGE_AHEAD + 5) continue;
        // 连通性保证：查找前后长直轨道的颜色
        var prevLongColor = getPrevLongTrackColor(j);
        var nextLongInfo = getNextLongTrackInfo(j + 1);
        var nextLongColor = nextLongInfo ? nextLongInfo.colorIdx : prevLongColor;
        var sd = createSegmentMeshes(j, cz, prevLongColor, nextLongColor);
        for (var k = 0; k < sd.meshes.length; k++) {
          var px = sd.meshes[k].posX !== undefined ? sd.meshes[k].posX : 0;
          sd.meshes[k].main.position.set(px, trackY, sd.meshes[k].posZ);
          sd.meshes[k].glow.position.set(px, trackY - 0.005, sd.meshes[k].posZ);
          scene.add(sd.meshes[k].main, sd.meshes[k].glow);
          // 箭头贴片（类型2/3有 arrow 字段）
          if (sd.meshes[k].arrow) {
            sd.meshes[k].arrow.position.set(px, trackY + BLOCK_H / 2 + 0.005, sd.meshes[k].posZ);
            scene.add(sd.meshes[k].arrow);
          }
        }
        segmentPool.push({ meshes: sd.meshes, gridIdx: j, centerZ: cz, type: sd.type, blockInfos: sd.blockInfos });
        segActiveSet.add(j);
      }

      cleanupSegCenterMap(idxStart);

      // 更新透明度
      var dotZ = ballZ + 10 - Math.abs(((t * 2) % 20) - 10);
      trackDot.position.set(0, trackY + 0.06, dotZ);
      dotHalo.position.set(0, trackY + 0.06, dotZ);

      for (var si = 0; si < segmentPool.length; si++) {
        var s = segmentPool[si];
        for (var smi = 0; smi < s.meshes.length; smi++) {
          var sm = s.meshes[smi];
          var sz = sm.main.position.z;
          var da = sz - ballZ;
          var ff = da > 0 ? Math.max(0.05, 1 - da / BLOCK_RANGE_AHEAD) : 1;
          var fb = da < 0 ? Math.max(0.05, 1 + da / BLOCK_RANGE_BEHIND) : 1;
          var fval = ff * fb;
          sm.main.material.opacity = 1.0 * fval;
          sm.glow.material.opacity = 0.7 * fval;
        }
      }

      // 相机控制
      camera.position.set(0, 4, ballZ - camDist);
      camera.rotation.x = savedCamRotX;
      camera.rotation.y = savedCamRotY;
      camera.rotation.z = savedCamRotZ;

      // 更新距离 HUD
      updateDistanceHUD();

      renderer.render(scene, camera);
    }
    animate();

    // ── 音量切换 ──
    var audioToggleBtn = document.getElementById('audio-toggle');
    var audioMuted = false;
    audioToggleBtn.addEventListener('click', function() {
      audioMuted = !audioMuted;
      if (audioMuted) {
        GameAudio.setVolume(0);
        GameAudio.sfxVolume = 0;
        audioToggleBtn.classList.add('muted');
        audioToggleBtn.textContent = '✕';
      } else {
        GameAudio.setVolume(0.35);
        GameAudio.sfxVolume = 0.5;
        audioToggleBtn.classList.remove('muted');
        audioToggleBtn.textContent = '♪';
      }
    });

    // ── 游戏启动：显示选关界面 ──
    gameState = 'gameover';  // 冻结物理
    buildLevelGrid();
    levelSelectOverlayEl.classList.add('active');
  </script>
</body>
</html>
